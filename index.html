<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diving Cat's 제주 프리다이빙 & 스노쿨링 스팟</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 50%, #0288d1 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-20%) translateY(-20%); }
            50% { transform: translateX(20%) translateY(20%); }
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        .header .cat-img {
            width: 50px;
            height: 50px;
            vertical-align: middle;
            margin-left: 10px;
            border-radius: 50%;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            margin-top: 8px;
            font-size: 1rem;
            position: relative;
            z-index: 1;
        }

        /* Main container */
        .container {
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .container {
                flex-direction: row;
            }
        }

        /* Map */
        .map-container {
            flex: 2;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border: 4px solid white;
        }

        #map {
            height: 500px;
            width: 100%;
        }

        @media (min-width: 1024px) {
            #map {
                height: 700px;
            }
        }

        /* Sidebar */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Category filters */
        .filters {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .filters h3 {
            color: #0288d1;
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #4fc3f7;
            border-radius: 20px;
            background: white;
            color: #0288d1;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79,195,247,0.4);
        }

        /* Spot list */
        .spot-list {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            max-height: 500px;
            overflow-y: auto;
        }

        .spot-list h3 {
            color: #0288d1;
            margin-bottom: 15px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 0;
            background: white;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e0f7fa;
        }

        .spot-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #f8fdff 0%, #e3f5fc 100%);
        }

        .spot-item:hover {
            transform: translateX(5px);
            border-color: #4fc3f7;
            box-shadow: 0 4px 15px rgba(79,195,247,0.2);
        }

        .spot-item h4 {
            color: #01579b;
            font-size: 1rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spot-item .depth {
            font-size: 0.8rem;
            color: #0288d1;
            background: #e1f5fe;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .spot-item p {
            color: #546e7a;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .spot-item .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 8px;
            background: #fff3e0;
            color: #e65100;
        }

        .tag.beginner { background: #e8f5e9; color: #2e7d32; }
        .tag.advanced { background: #fce4ec; color: #c2185b; }
        .tag.boat { background: #ede7f6; color: #512da8; }

        /* Detail modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 25px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 2001;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #4fc3f7 0%, #0288d1 100%);
            padding: 25px;
            border-radius: 25px 25px 0 0;
            position: relative;
        }

        .modal-header h2 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .modal-header .location {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .info-card.depth { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
        .info-card.level { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); }
        .info-card.type { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
        .info-card.access { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); }

        .info-card .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .info-card .label {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 3px;
        }

        .info-card .value {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .section {
            margin-bottom: 20px;
        }

        .section h3 {
            color: #0288d1;
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 2px dashed #e0f7fa;
        }

        .section p {
            color: #546e7a;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .photo-placeholder {
            aspect-ratio: 1;
            border-radius: 12px;
            background: linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0288d1;
            font-size: 0.75rem;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px dashed #4fc3f7;
        }

        .photo-placeholder:hover {
            background: linear-gradient(135deg, #b3e5fc 0%, #81d4fa 100%);
            transform: scale(1.05);
        }

        .photo-placeholder .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .reviews {
            background: #fafafa;
            border-radius: 12px;
            padding: 15px;
        }

        .review-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .reviewer {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }

        .review-date {
            color: #999;
            font-size: 0.8rem;
        }

        .review-text {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .stars {
            color: #ffc107;
        }

        .instagram-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .instagram-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(131,58,180,0.4);
        }

        /* Paw marker */
        .paw-marker {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .paw-marker:hover {
            transform: scale(1.2);
        }

        /* Leaflet popup custom */
        .leaflet-popup-content-wrapper {
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .leaflet-popup-content {
            margin: 12px 15px;
        }

        .popup-content {
            text-align: center;
        }

        .popup-content h4 {
            color: #0288d1;
            margin-bottom: 5px;
        }

        .popup-content p {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .popup-btn {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .popup-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(41,182,246,0.4);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #0288d1;
            font-size: 0.9rem;
        }

        .footer .paws {
            font-size: 1.2rem;
            letter-spacing: 5px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #e1f5fe;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            border-radius: 10px;
        }

        /* Legend */
        .legend {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .legend h3 {
            color: #0288d1;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #546e7a;
        }

        .legend-paw {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .legend-paw svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Diving Cat's 제주 다이빙 스팟 <img src="free_diving_cat.png" alt="Diving Cat" class="cat-img"></h1>
        <p>제주도 프리다이빙 & 스노쿨링 명소를 고양이 발자국을 따라 탐험해보세요!</p>
    </header>

    <div class="container">
        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="sidebar">
            <div class="filters">
                <h3>🎯 카테고리 필터</h3>
                <div class="filter-btns">
                    <button class="filter-btn active" data-filter="all">전체</button>
                    <button class="filter-btn" data-filter="freediving">프리다이빙</button>
                    <button class="filter-btn" data-filter="snorkeling">스노쿨링</button>
                    <button class="filter-btn" data-filter="beginner">초보자용</button>
                    <button class="filter-btn" data-filter="boat">보트 다이빙</button>
                </div>
            </div>

            <div class="legend">
                <h3>🐾 발자국 안내</h3>
                <div class="legend-item">
                    <span class="legend-paw freediving">
                        <svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="22" ry="18" fill="#1565c0"/><ellipse cx="28" cy="38" rx="10" ry="12" fill="#1565c0"/><ellipse cx="50" cy="30" rx="10" ry="12" fill="#1565c0"/><ellipse cx="72" cy="38" rx="10" ry="12" fill="#1565c0"/></svg>
                    </span>
                    <span>프리다이빙 전문</span>
                </div>
                <div class="legend-item">
                    <span class="legend-paw snorkeling">
                        <svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="22" ry="18" fill="#2e7d32"/><ellipse cx="28" cy="38" rx="10" ry="12" fill="#2e7d32"/><ellipse cx="50" cy="30" rx="10" ry="12" fill="#2e7d32"/><ellipse cx="72" cy="38" rx="10" ry="12" fill="#2e7d32"/></svg>
                    </span>
                    <span>스노쿨링 추천</span>
                </div>
                <div class="legend-item">
                    <span class="legend-paw both">
                        <svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="22" ry="18" fill="#9c27b0"/><ellipse cx="28" cy="38" rx="10" ry="12" fill="#9c27b0"/><ellipse cx="50" cy="30" rx="10" ry="12" fill="#9c27b0"/><ellipse cx="72" cy="38" rx="10" ry="12" fill="#9c27b0"/></svg>
                    </span>
                    <span>둘 다 가능</span>
                </div>
            </div>

            <div class="spot-list">
                <h3>🏊 다이빙 스팟 목록</h3>
                <div id="spotListContainer"></div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <h2 id="modalTitle"></h2>
                <p class="location" id="modalLocation"></p>
            </div>
            <div class="modal-body">
                <div class="info-grid">
                    <div class="info-card depth">
                        <div class="icon">🌊</div>
                        <div class="label">수심</div>
                        <div class="value" id="modalDepth"></div>
                    </div>
                    <div class="info-card level">
                        <div class="icon">⭐</div>
                        <div class="label">난이도</div>
                        <div class="value" id="modalLevel"></div>
                    </div>
                    <div class="info-card type">
                        <div class="icon">🤿</div>
                        <div class="label">유형</div>
                        <div class="value" id="modalType"></div>
                    </div>
                    <div class="info-card access">
                        <div class="icon">🚗</div>
                        <div class="label">접근성</div>
                        <div class="value" id="modalAccess"></div>
                    </div>
                </div>

                <div class="section">
                    <h3>✨ 특이점</h3>
                    <p id="modalFeatures"></p>
                </div>

                <div class="section">
                    <h3>📸 인스타그램 사진</h3>
                    <div class="photo-grid" id="modalPhotos"></div>
                    <a href="#" class="instagram-link" id="instagramLink" target="_blank">
                        📷 인스타그램에서 더 보기
                    </a>
                </div>

                <div class="section">
                    <h3>💬 다이버 후기</h3>
                    <div class="reviews" id="modalReviews"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p class="paws">🐾 🐾 🐾 🐾 🐾</p>
        <p>Diving Cat과 함께하는 제주 바다 탐험</p>
        <p style="font-size: 0.8rem; margin-top: 5px; color: #90a4ae;">안전한 다이빙을 위해 항상 전문 교육을 받고, 장비를 점검하세요!</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

                instagramTag: "범섬다이빙",

        // Initialize map with bounds restricted to Jeju
        const jejuBounds = [
            [33.0, 126.0],  // Southwest
            [33.7, 127.1]   // Northeast
        ];

        const map = L.map('map', {
            maxBounds: jejuBounds,
            maxBoundsViscosity: 1.0,
            minZoom: 9
        }).setView([33.38, 126.55], 10);

        // Watercolor style map
        L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg', {
            attribution: '&copy; <a href="https://stadiamaps.com/">Stadia Maps</a> &copy; <a href="https://stamen.com/">Stamen Design</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 17
        }).addTo(map);

        // Add subtle labels on top
        L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain_labels/{z}/{x}/{y}{r}.png', {
            attribution: '',
            maxZoom: 17
        }).addTo(map);

        // Custom paw icon (SVG cat paw)
        const createPawIcon = (type) => {
            let color = '#9c27b0'; // default purple (both)
            if (type === 'freediving') {
                color = '#1565c0'; // blue
            } else if (type === 'snorkeling') {
                color = '#2e7d32'; // green
            }

            const pawSvg = `
                <svg viewBox="0 0 100 100" width="38" height="38" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));">
                    <!-- Main pad -->
                    <ellipse cx="50" cy="65" rx="22" ry="18" fill="${color}"/>
                    <!-- Toe pads -->
                    <ellipse cx="28" cy="38" rx="10" ry="12" fill="${color}"/>
                    <ellipse cx="50" cy="30" rx="10" ry="12" fill="${color}"/>
                    <ellipse cx="72" cy="38" rx="10" ry="12" fill="${color}"/>
                </svg>
            `;

            return L.divIcon({
                html: `<div class="paw-marker">${pawSvg}</div>`,
                className: 'paw-icon',
                iconSize: [38, 38],
                iconAnchor: [19, 19]
            });
        };

        // Add markers
        let markers = [];
        divingSpots.forEach(spot => {
            const marker = L.marker(spot.coords, {
                icon: createPawIcon(spot.type === '둘 다 가능' ? 'both' :
                    spot.type === '프리다이빙' ? 'freediving' : 'snorkeling')
            }).addTo(map);

            marker.spotData = spot;

            const popupContent = `
                <div class="popup-content">
                    <h4>🐾 ${spot.name}</h4>
                    <p>${spot.location}</p>
                    <p><strong>수심:</strong> ${spot.depth} | <strong>난이도:</strong> ${spot.level}</p>
                    <button class="popup-btn" onclick="openModal(${spot.id})">상세보기 🐱</button>
                </div>
            `;

            marker.bindPopup(popupContent);
            markers.push(marker);
        });

        // Generate spot list
        function generateSpotList(spots) {
            const container = document.getElementById('spotListContainer');
            container.innerHTML = spots.map(spot => `
                <div class="spot-item" onclick="focusSpot(${spot.id})">
                    <h4>🐾 ${spot.name}</h4>
                    <span class="depth">${spot.depth}</span>
                    <p>${spot.location}</p>
                    <div class="tags">
                        ${spot.category.includes('beginner') ? '<span class="tag beginner">초보자 OK</span>' : ''}
                        ${spot.category.includes('boat') ? '<span class="tag boat">보트 필요</span>' : ''}
                        ${spot.category.includes('freediving') ? '<span class="tag">프리다이빙</span>' : ''}
                        ${spot.category.includes('snorkeling') ? '<span class="tag">스노쿨링</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        generateSpotList(divingSpots);

        // Focus on spot
        function focusSpot(id) {
            const spot = divingSpots.find(s => s.id === id);
            if (spot) {
                map.setView(spot.coords, 14);
                const marker = markers.find(m => m.spotData.id === id);
                if (marker) marker.openPopup();
            }
        }

        // Modal functions
        function openModal(id) {
            const spot = divingSpots.find(s => s.id === id);
            if (!spot) return;

            document.getElementById('modalTitle').textContent = spot.name;
            document.getElementById('modalLocation').textContent = `📍 ${spot.location}`;
            document.getElementById('modalDepth').textContent = spot.depth;
            document.getElementById('modalLevel').textContent = spot.level;
            document.getElementById('modalType').textContent = spot.type;
            document.getElementById('modalAccess').textContent = spot.access;
            document.getElementById('modalFeatures').textContent = spot.features;

            // Photos
            document.getElementById('modalPhotos').innerHTML = spot.photos.map(photo => `
                <div class="photo-placeholder" onclick="window.open('https://www.instagram.com/explore/tags/${spot.instagramTag}/', '_blank')">
                    <span class="icon">📷</span>
                    <span>${photo}</span>
                </div>
            `).join('');

            // Instagram link
            document.getElementById('instagramLink').href = `https://www.instagram.com/explore/tags/${spot.instagramTag}/`;

            // Reviews
            document.getElementById('modalReviews').innerHTML = spot.reviews.map(review => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="reviewer">${review.user}</span>
                        <span class="review-date">${review.date}</span>
                    </div>
                    <div class="stars">${'⭐'.repeat(review.rating)}</div>
                    <p class="review-text">${review.text}</p>
                </div>
            `).join('');

            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') closeModal();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;

                // Filter markers
                markers.forEach(marker => {
                    const spot = marker.spotData;
                    let show = filter === 'all' || spot.category.includes(filter);

                    if (show) {
                        marker.addTo(map);
                    } else {
                        map.removeLayer(marker);
                    }
                });

                // Filter list
                const filteredSpots = filter === 'all'
                    ? divingSpots
                    : divingSpots.filter(s => s.category.includes(filter));
                generateSpotList(filteredSpots);
            });
        });

        // Make functions globally accessible
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.focusSpot = focusSpot;
    </script>
</body>
</html>
